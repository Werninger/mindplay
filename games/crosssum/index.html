<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cross Sum — mindplay</title>
  <link rel="stylesheet" href="../../assets/style.css" />
  <link rel="manifest" href="../../manifest.json" />
  <meta name="theme-color" content="#1D9E75" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
</head>
<body class="cs-page">
  <header>
    <div class="header-left">
      <button class="back-btn" onclick="location.href='../../index.html'" aria-label="Back">&#8592;</button>
      <a href="../../index.html" class="logo">mindplay</a>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="hint-btn" aria-label="Hint">💡</button>
      <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme">🌙</button>
    </div>
  </header>

  <main class="cs-main">

    <div id="hint-panel" class="hint-panel">
      <strong>How to play:</strong> Sum all six numbers.
      If the result has more than one digit, sum its digits again.
      Repeat until you have a single digit — that's the <strong>digital root</strong>.
      <br /><br />
      Example: 4, 3, 6, 9, 1, 2 → 4+3+6+9+1+2 = 25 → 2+5 = <strong>7</strong>
    </div>

    <div class="cs-timer-row">
      <div class="cs-timer">
        <span class="cs-timer-icon">⏱</span>
        <span id="timer" class="cs-timer-value">0:00</span>
      </div>
      <button class="btn btn-secondary cs-new-btn" id="new-btn">New</button>
    </div>

    <div class="cs-section-label">Numbers</div>
    <div class="cs-tiles" id="numbers-display"></div>
    <div class="cs-subtitle">What is the cross sum?</div>

    <div class="cs-answer-row">
      <input
        class="cs-input"
        type="number"
        inputmode="numeric"
        pattern="[0-9]*"
        id="answer-input"
        min="1"
        max="9"
        placeholder="?"
        autocomplete="off"
      />
      <button class="btn" id="check-btn">Check</button>
    </div>

    <div id="message" class="message cs-message"></div>

    <div class="cs-divider"></div>

    <div class="cs-section-label">Top 5 Fastest</div>
    <ul class="cs-scores" id="scores-list"></ul>

  </main>

  <script src="../../assets/app.js"></script>
  <script src="game.js"></script>
</body>
</html>
